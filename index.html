<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Travel Planner</h1>
    <div class="badge">v1.4 RC1</div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>行程景點</h2>

      <div class="search-box">
        <input id="placeInput" type="text" placeholder="輸入景點，例如：國立臺灣美術館" />
        <button id="addPlaceBtn">加入</button>
      </div>

      <button id="clearAllBtn" class="clear-btn">清空全部</button>

      <p class="hint">可新增、刪除、拖曳排序，重新整理後會保留。</p>
      <div id="placeList"></div>
    </section>

    <section class="panel map-panel">
      <h2>地圖</h2>
      <iframe
        id="mapFrame"
        src="https://www.google.com/maps?q=國立臺灣美術館&output=embed"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </section>

    <section class="panel">
      <h2>行程表</h2>
      <div id="schedule"></div>

      <h2>景點資訊</h2>
      <div id="placeInfo">
        <p>輸入景點後，地圖會顯示 Google Maps 搜尋結果。</p>
      </div>
    </section>
  </main>

  <script src="storage.js?v=14"></script>
  <script src="map.js?v=14"></script>
  <script src="app.js?v=14"></script>
</body>
</html>
