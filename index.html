<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    header {
      padding: 32px 20px;
      background: #111827;
      color: white;
      text-align: center;
    }
    main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Travel Planner</h1>
    <p>繁體中文 Google Maps 旅遊規劃工具</p>
  </header>

  <main>
    <section class="card">
      <h2>網站已成功啟動</h2>
      <p>這是第一個可驗證版本。下一步會加入景點卡片、拖曳排序與地圖區。</p>
      <button onclick="alert('第一版測試成功')">測試按鈕</button>
    </section>
  </main>
</body>
</html>
