<!DOCTYPE html>

  <title>Travel Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Travel Planner</h1>
    <div class="badge">Google Maps 測試版</div>

    <section class="panel">
      <h2>景點資訊</h2>
      <p>目前測試：Google Maps 是否能成功載入。</p>
    </section>
  </main>

  <script src="script.js"></script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDo0jDs1143sHcUI359D194SlX6mDzWmiM&callback=initMap"

    defer>

</html>
