<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Travel Planner</h1>
    <div class="badge">Google Maps 測試版</div>
  </header>

  <main class="layout">
    <section class="panel">
<h2>行程景點</h2>

<div class="search-box">
  <input id="placeInput" type="text" placeholder="搜尋景點，例如：國立臺灣美術館" />
  <button id="addPlaceBtn">加入</button>
</div>

<div id="placeList"></div>
    </section>

    <section class="panel">
      <h2>地圖</h2>
      <div id="map"></div>
    </section>

    <section class="panel">
<h2>景點資訊</h2>
<div id="placeInfo">
  <p>搜尋並加入景點後，這裡會顯示景點資訊。</p>
</div>
    </section>
  </main>

  <script src="script.js"></script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDo0jDs1143sHcUI359D194SlX6mDzWmiM&libraries=places&callback=initMap&language=zh-TW&region=TW"
  async
  defer>
</script>
</body>
</html>
